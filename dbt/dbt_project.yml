name: 'energy_pipeline'
version: '1.0.0'
config-version: 2

profile: 'energy_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  energy_pipeline:
    staging:
      +materialized: view        # lightweight — just a typed view over the external table
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table       # persisted tables, fast for BI queries and presentation
      +schema: marts
