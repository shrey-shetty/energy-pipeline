version: 2

models:
  - name: mart_hourly_energy
    description: >
      Hourly energy market fact table combining renewable generation,
      total generation, and day-ahead prices. Primary analytical table.
    columns:
      - name: interval_start_utc
        description: Start of the hourly interval in UTC.
        tests:
          - not_null
          - unique
      - name: price_eur_mwh
        description: Germany/Luxembourg day-ahead price (EUR/MWh).
        tests:
          - not_null
      - name: renewable_share_pct
        description: Renewable share as % of total generation.
        tests:
          - not_null
      - name: price_band
        description: Price category (Negative/Low/Medium/High).
        tests:
          - not_null
          - accepted_values:
              values: ['Negative', 'Low (0–50)', 'Medium (50–100)', 'High (100–200)', 'Very High (>200)']

  - name: mart_daily_summary
    description: >
      Daily aggregates of renewable share and price. Used for trend analysis
      and dashboard time-series charts.
    columns:
      - name: date
        description: Calendar date (UTC).
        tests:
          - not_null
          - unique
      - name: avg_renewable_share_pct
        description: Average renewable share across all hours of the day.
        tests:
          - not_null
      - name: avg_price_eur_mwh
        description: Average day-ahead price across all hours of the day.
        tests:
          - not_null

  - name: mart_renewable_price_correlation
    description: >
      Aggregated view showing the relationship between renewable share buckets
      and average electricity prices — the merit-order effect.
    columns:
      - name: renewable_share_bucket
        description: Renewable share grouped into 10% buckets.
        tests:
          - not_null
      - name: avg_price_eur_mwh
        description: Average price for hours in this renewable share bucket.
        tests:
          - not_null
